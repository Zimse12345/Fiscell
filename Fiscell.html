<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fiscell</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="brand-lockup">
        <svg class="brand-logo" viewBox="0 0 40 40" aria-hidden="true">
          <rect x="5" y="5" width="30" height="30" rx="8"></rect>
          <path d="M13 15h14M13 21h8M13 27h14"></path>
          <path d="M24 20c4 0 7-3 7-7"></path>
        </svg>
        <div>
          <h1>Fiscell</h1>
          <p class="eyebrow">v1.0.29 · author:Zimse</p>
        </div>
        <a class="repo-link" href="https://github.com/Zimse12345/Fiscell" target="_blank" rel="noopener noreferrer">GitHub</a>
      </div>
      <div class="header-actions">
        <button id="themeToggle" class="theme-toggle" type="button" title="切换主题" aria-label="切换主题">
          <span id="themeIcon">☀</span>
        </button>
        <button id="clearAllBtn" class="danger" type="button">清空数据</button>
        <div class="header-menu-wrap">
          <button id="importBtn" class="secondary" type="button" aria-expanded="false">导入</button>
          <div id="importMenu" class="header-menu hidden">
            <button id="importReplaceBtn" type="button">覆盖</button>
            <button id="importMergeBtn" type="button">合并</button>
          </div>
        </div>
        <div class="header-menu-wrap">
          <button id="exportBtn" class="secondary" type="button" aria-expanded="false">导出</button>
          <div id="exportMenu" class="header-menu hidden">
            <button id="exportJsonBtn" type="button">JSON</button>
            <button id="exportCsvBtn" type="button">CSV</button>
          </div>
        </div>
        <button id="copyPromptBtn" class="secondary" type="button" title="复制账单转换提示词">复制提示词</button>
        <input id="importFile" class="hidden-file-input" type="file" accept="application/json,text/csv,.json,.csv">
      </div>
    </header>

    <main class="app-shell">
      <section class="workspace">
        <aside class="entry-panel">
          <div class="panel-heading">
            <h2 id="formTitle">添加一笔</h2>
            <button id="resetFormBtn" class="icon-text" type="button">清空</button>
          </div>

          <form id="entryForm" autocomplete="off">
            <input id="recordId" type="hidden">

            <div class="segmented three" role="radiogroup" aria-label="账目类型">
              <label>
                <input type="radio" name="kind" value="expense" checked>
                <span>支出</span>
              </label>
              <label>
                <input type="radio" name="kind" value="income">
                <span>收入</span>
              </label>
              <label>
                <input type="radio" name="kind" value="investment">
                <span>理财</span>
              </label>
            </div>

            <label class="field">
              <span>金额</span>
              <input id="amount" type="number" min="0" step="0.01" placeholder="0.00" required>
            </label>

            <div id="investmentActionField" class="field hidden">
              <span>操作</span>
              <div class="segmented" role="radiogroup" aria-label="理财操作">
                <label>
                  <input type="radio" name="investmentAction" value="买入" checked>
                  <span>买入</span>
                </label>
                <label>
                  <input type="radio" name="investmentAction" value="做空">
                  <span>做空</span>
                </label>
              </div>
            </div>

            <label id="profitField" class="field hidden">
              <span>理财收益</span>
              <input id="investmentProfit" type="number" step="0.01" placeholder="收益金额">
            </label>

            <div id="projectField" class="field hidden">
              <label for="investmentProject">理财项目</label>
              <div class="combo-field">
                <input id="investmentProject" data-combo-list="projectOptions" placeholder="选择或输入项目">
                <button class="combo-button" type="button" data-combo-for="investmentProject" aria-label="展开理财项目">▾</button>
                <div class="combo-menu hidden" data-combo-menu="investmentProject"></div>
              </div>
              <datalist id="projectOptions"></datalist>
            </div>

            <div id="targetField" class="field hidden">
              <label for="investmentTarget">具体标的</label>
              <div class="combo-field">
                <input id="investmentTarget" data-combo-list="targetOptions" placeholder="名称、代码或简称">
                <button class="combo-button" type="button" data-combo-for="investmentTarget" aria-label="展开具体标的">▾</button>
                <div class="combo-menu hidden" data-combo-menu="investmentTarget"></div>
              </div>
              <datalist id="targetOptions"></datalist>
            </div>

            <div class="field">
              <label id="categoryLabel" for="category">分类</label>
              <div class="combo-field">
                <input id="category" data-combo-list="categoryOptions" placeholder="选择或输入分类">
                <button class="combo-button" type="button" data-combo-for="category" aria-label="展开分类">▾</button>
                <div class="combo-menu hidden" data-combo-menu="category"></div>
              </div>
              <datalist id="categoryOptions"></datalist>
            </div>

            <label id="pendingBox" class="check-row">
              <input id="pendingToggle" type="checkbox">
              <span id="pendingLabel">标记为预支出</span>
            </label>

            <label class="field">
              <span>时间</span>
              <input id="occurredAt" type="datetime-local" required>
            </label>

            <label class="check-row">
              <input id="useCurrentTime" type="checkbox" checked>
              <span>使用当前系统时间</span>
            </label>

            <label class="field">
              <span>备注</span>
              <textarea id="note" rows="3"></textarea>
            </label>

            <label class="field">
              <span>标签</span>
              <input id="tags">
            </label>

            <button id="submitBtn" class="primary" type="submit">保存记录</button>
          </form>
        </aside>

        <section class="main-panel">
          <div class="toolbar">
            <label class="field compact">
              <span>类型</span>
              <select id="kindFilter">
                <option value="all">全部</option>
                <option value="expense">支出</option>
                <option value="income">收入</option>
                <option value="investment">理财</option>
              </select>
            </label>
            <label class="field compact grow">
              <span>搜索</span>
              <input id="searchInput" type="search" placeholder="分类、理财项目、具体标的、备注、标签">
            </label>
            <button id="moreFiltersBtn" class="secondary" type="button" aria-expanded="false">更多筛选</button>
          </div>

          <div id="advancedFilters" class="advanced-filters hidden">
            <label class="field compact">
              <span>开始时间</span>
              <input id="startDateFilter" type="date">
            </label>
            <label class="field compact">
              <span>截至时间</span>
              <input id="endDateFilter" type="date">
            </label>
            <label class="field compact">
              <span>一级分类</span>
              <div class="combo-field">
                <input id="primaryCategoryFilter" data-combo-list="primaryCategoryOptions" placeholder="全部">
                <button class="combo-button" type="button" data-combo-for="primaryCategoryFilter" aria-label="展开一级分类">▾</button>
                <div class="combo-menu hidden" data-combo-menu="primaryCategoryFilter"></div>
              </div>
              <datalist id="primaryCategoryOptions"></datalist>
            </label>
            <label class="field compact">
              <span>二级分类</span>
              <div class="combo-field">
                <input id="secondaryCategoryFilter" data-combo-list="secondaryCategoryOptions" placeholder="全部">
                <button class="combo-button" type="button" data-combo-for="secondaryCategoryFilter" aria-label="展开二级分类">▾</button>
                <div class="combo-menu hidden" data-combo-menu="secondaryCategoryFilter"></div>
              </div>
              <datalist id="secondaryCategoryOptions"></datalist>
            </label>
            <label class="field compact">
              <span>排序方式</span>
              <select id="sortByFilter">
                <option value="time">时间</option>
                <option value="amount">金额</option>
                <option value="note">备注（字典序）</option>
              </select>
            </label>
          </div>

          <div id="pendingBanner" class="pending-banner hidden">
            <span id="pendingBannerText"></span>
            <button id="clearPendingViewBtn" class="secondary" type="button">查看全部</button>
          </div>

          <section class="records-section">
            <div class="panel-heading">
              <div class="records-title">
                <h2>账目明细</h2>
                <span id="visibleCount" class="hint"></span>
              </div>
              <div class="batch-actions">
                <div id="batchTools" class="batch-tools hidden">
                  <button id="selectAllBtn" class="secondary" type="button">全选</button>
                  <button id="clearSelectionBtn" class="secondary" type="button">清除</button>
                  <button id="deleteSelectedBtn" class="danger" type="button">删除</button>
                  <div class="batch-menu-wrap">
                    <button id="exportSelectedBtn" class="secondary" type="button" aria-expanded="false">导出</button>
                    <div id="batchExportMenu" class="header-menu batch-export-menu hidden">
                      <button id="exportSelectedJsonBtn" type="button">JSON</button>
                      <button id="exportSelectedCsvBtn" type="button">CSV</button>
                    </div>
                  </div>
                </div>
                <button id="batchToggleBtn" class="secondary" type="button">批量选择</button>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th class="select-col hidden">选择</th>
                    <th>类型</th>
                    <th>分类 / 项目</th>
                    <th>金额</th>
                    <th>状态</th>
                    <th>备注</th>
                    <th class="time-col">时间</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="recordsBody"></tbody>
              </table>
              <div id="emptyState" class="empty-state">
                还没有记录，先添加第一笔账。
              </div>
            </div>
            <div class="pagination-bar">
              <label class="page-size">
                <span>每页</span>
                <select id="pageSizeSelect">
                  <option value="5">5</option>
                  <option value="20">20</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                  <option value="200">200</option>
                </select>
              </label>
              <div class="page-controls">
                <button id="firstPageBtn" class="secondary" type="button">首页</button>
                <button id="prevPageBtn" class="secondary" type="button">上一页</button>
                <label class="page-jump">
                  <span>第</span>
                  <input id="pageInput" type="number" min="1" value="1">
                  <span id="pageTotalText">/ 1 页</span>
                </label>
                <button id="nextPageBtn" class="secondary" type="button">下一页</button>
                <button id="lastPageBtn" class="secondary" type="button">尾页</button>
              </div>
            </div>
          </section>
        </section>

        <aside class="stats-panel">
          <div class="stats-actions">
            <button id="setAssetBtn" class="secondary" type="button" title="按当前实际资产自动生成误差项">设置当前资产</button>
          </div>
          <section class="summary-grid" aria-label="资产汇总">
            <button id="totalAssetsCard" class="metric metric-button balance" type="button">
              <span>总资产</span>
              <strong id="totalAssets">￥0.00</strong>
            </button>
            <button id="pendingIncomeCard" class="metric metric-button income" type="button">
              <span>预收入</span>
              <strong id="pendingIncome">￥0.00</strong>
            </button>
            <button id="pendingDebtCard" class="metric metric-button expense" type="button">
              <span>预支出</span>
              <strong id="pendingDebt">￥0.00</strong>
            </button>
            <article class="metric actual">
              <span>实际资产</span>
              <strong id="actualAssets">￥0.00</strong>
            </article>
            <article class="metric flexible">
              <span>灵活资产</span>
              <strong id="flexibleAssets">￥0.00</strong>
            </article>
          </section>

          <div id="chartDrawer" class="chart-drawer hidden">
            <div class="panel-heading">
              <h2 id="chartDrawerTitle">结构详情</h2>
            </div>
            <div id="chartDrawerBody" class="detail-list"></div>
          </div>

          <div class="charts">
            <section class="chart-box" data-chart-detail="income">
              <div class="panel-heading">
                <h2>收入结构</h2>
                <span id="incomeHint" class="hint"></span>
              </div>
              <canvas id="incomeChart" width="360" height="240" aria-label="收入结构图"></canvas>
            </section>
            <section class="chart-box" data-chart-detail="expense">
              <div class="panel-heading">
                <h2>支出结构</h2>
                <span id="expenseHint" class="hint"></span>
              </div>
              <canvas id="expenseChart" width="360" height="240" aria-label="支出结构图"></canvas>
            </section>
          </div>
        </aside>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <div id="actionMenu" class="action-menu hidden">
      <button type="button" data-menu-action="copy">复制</button>
      <button type="button" data-menu-action="edit">编辑</button>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
